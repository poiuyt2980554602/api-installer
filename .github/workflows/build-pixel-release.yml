name: Build Pixel Release

on:
  workflow_dispatch:
    inputs:
      pixel_version:
        description: Pixel tag to build
        required: true
        default: "1.0.12"
  push:
    tags:
      - "v*-pixel"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PIXEL_VERSION: ${{ github.event.inputs.pixel_version || '1.0.12' }}
    steps:
      - name: Checkout installer repo
        uses: actions/checkout@v4

      - name: Resolve version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          version="${version%-pixel}"
          echo "PIXEL_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Download Pixel source
        run: |
          curl -fsSL "https://github.com/Pixel-API/Pixel/archive/refs/tags/${PIXEL_VERSION}.tar.gz" -o pixel.tar.gz
          mkdir pixel-src
          tar -xzf pixel.tar.gz -C pixel-src --strip-components=1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pixel-src/frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          pnpm --dir pixel-src/frontend install --frozen-lockfile
          pnpm --dir pixel-src/frontend run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: pixel-src/backend/go.mod
          cache-dependency-path: pixel-src/backend/go.sum

      - name: Build Linux binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          for arch in amd64 arm64; do
            out="package-${arch}"
            mkdir -p "$out"
            (
              cd pixel-src/backend
              GOOS=linux GOARCH="$arch" CGO_ENABLED=0 go build \
                -tags=embed \
                -trimpath \
                -ldflags="-s -w -X main.Version=${PIXEL_VERSION} -X main.BuildType=release" \
                -o "../../${out}/sub2api" \
                ./cmd/server
            )
            cp -R pixel-src/deploy "$out/deploy"
            cp pixel-src/README.md "$out/README.md"
            cp pixel-src/LICENSE "$out/LICENSE"
            tar -C "$out" -czf "dist/sub2api_${PIXEL_VERSION}_linux_${arch}.tar.gz" .
          done
          (
            cd dist
            sha256sum *.tar.gz > checksums.txt
          )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PIXEL_VERSION }}-pixel
          name: Pixel ${{ env.PIXEL_VERSION }} Sub2API binaries
          body: |
            Prebuilt Sub2API-compatible binaries built from Pixel-API/Pixel tag `${{ env.PIXEL_VERSION }}`.

            Install:
            ```bash
            curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/deploy/install.sh | sudo bash
            ```
          files: |
            dist/*.tar.gz
            dist/checksums.txt
