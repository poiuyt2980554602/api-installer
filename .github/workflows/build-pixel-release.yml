name: Build Pixel Release

on:
  workflow_dispatch:
    inputs:
      pixel_version:
        description: Release version to publish
        required: true
        default: "1.0.15"
      pixel_source_version:
        description: Upstream Pixel source tag
        required: true
        default: "1.0.12"
  push:
    tags:
      - "v*-pixel"
      - "v*-forwarder-pixel"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PIXEL_VERSION: ${{ github.event.inputs.pixel_version || '1.0.15' }}
      PIXEL_SOURCE_VERSION: ${{ github.event.inputs.pixel_source_version || '1.0.12' }}
    steps:
      - name: Download installer repo
        run: |
          curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/archive/${GITHUB_SHA}.tar.gz" -o installer.tar.gz
          tar -xzf installer.tar.gz --strip-components=1

      - name: Resolve version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          version="${version%-forwarder-pixel}"
          version="${version%-pixel}"
          echo "PIXEL_VERSION=${version}" >> "$GITHUB_ENV"
          echo "PIXEL_SOURCE_VERSION=1.0.12" >> "$GITHUB_ENV"

      - name: Download Pixel source
        run: |
          curl -fsSL "https://github.com/Pixel-API/Pixel/archive/refs/tags/${PIXEL_SOURCE_VERSION}.tar.gz" -o pixel.tar.gz
          mkdir pixel-src
          tar -xzf pixel.tar.gz -C pixel-src --strip-components=1

      - name: Apply Pixel compatibility patches
        run: |
          set -euo pipefail
          if [ "${PIXEL_SOURCE_VERSION}" = "1.0.12" ]; then
            git apply --directory=pixel-src patches/pixel-1.0.12-subsite-forwarder.patch
          fi

      - name: Setup Node.js
        run: |
          set -euo pipefail
          curl -fsSL https://nodejs.org/dist/v20.19.4/node-v20.19.4-linux-x64.tar.xz -o node.tar.xz
          sudo tar -xJf node.tar.xz -C /usr/local --strip-components=1
          node --version
          npm --version

      - name: Setup pnpm
        run: |
          curl -fsSL https://github.com/pnpm/pnpm/releases/download/v9.0.0/pnpm-linux-x64 -o /tmp/pnpm
          chmod +x /tmp/pnpm
          sudo mv /tmp/pnpm /usr/local/bin/pnpm
          pnpm --version

      - name: Build frontend
        run: |
          pnpm --dir pixel-src/frontend install --frozen-lockfile
          pnpm --dir pixel-src/frontend run build

      - name: Setup Go
        run: |
          set -euo pipefail
          GO_VERSION="$(sed -n 's/^go //p' pixel-src/backend/go.mod | head -n1)"
          curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o go.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf go.tar.gz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          /usr/local/go/bin/go version

      - name: Build Linux binaries
        env:
          GOMAXPROCS: "2"
          GOGC: "50"
        run: |
          set -euo pipefail
          mkdir -p dist
          for arch in amd64; do
            out="package-${arch}"
            agent_out="subsite-agent-package-${arch}"
            mkdir -p "$out" "$agent_out"
            echo "::group::Build server linux/${arch}"
            (
              cd pixel-src/backend
              GOOS=linux GOARCH="$arch" CGO_ENABLED=0 go build \
                -tags=embed \
                -p=1 \
                -trimpath \
                -ldflags="-s -w -X main.Version=${PIXEL_VERSION} -X main.BuildType=release" \
                -o "../../${out}/sub2api" \
                ./cmd/server
            )
            echo "::endgroup::"
            echo "::group::Build subsite agent linux/${arch}"
            (
              cd pixel-src/backend
              GOOS=linux GOARCH="$arch" CGO_ENABLED=0 go build \
                -p=1 \
                -trimpath \
                -ldflags="-s -w" \
                -o "../../${agent_out}/sub2api-subsite-agent" \
                ./cmd/subsite-agent
            )
            echo "::endgroup::"
            cp -R pixel-src/deploy "$out/deploy"
            cp pixel-src/README.md "$out/README.md"
            cp pixel-src/LICENSE "$out/LICENSE"
            tar -C "$out" -czf "dist/sub2api_${PIXEL_VERSION}_linux_${arch}.tar.gz" .

            mkdir -p "$agent_out/deploy"
            cp pixel-src/deploy/sub2api-subsite-agent.service "$agent_out/deploy/sub2api-subsite-agent.service"
            cp pixel-src/deploy/subsite-agent.env.example "$agent_out/deploy/subsite-agent.env.example"
            cp pixel-src/README.md "$agent_out/README.md"
            cp pixel-src/LICENSE "$agent_out/LICENSE"
            tar -C "$agent_out" -czf "dist/sub2api-subsite-agent_${PIXEL_VERSION}_linux_${arch}.tar.gz" .
          done
          (
            cd dist
            sha256sum *.tar.gz > checksums.txt
          )

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="v${PIXEL_VERSION}-forwarder-pixel"
          body_file="$(mktemp)"
          cat > "$body_file" <<EOF
          Prebuilt Sub2API-compatible binaries built from Pixel-API/Pixel tag \`${PIXEL_SOURCE_VERSION}\` with the subsite forwarder patch. Published as \`${PIXEL_VERSION}\` for this custom forwarder release.

          Install:
          \`\`\`bash
          curl -sSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/deploy/install.sh | sudo bash
          \`\`\`
          EOF
          python3 - "$tag" "Pixel ${PIXEL_VERSION} Sub2API forwarder binaries" "$body_file" dist/*.tar.gz dist/checksums.txt <<'PY'
          import json
          import mimetypes
          import os
          import pathlib
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          tag, title, body_path, *assets = sys.argv[1:]
          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          api = f"https://api.github.com/repos/{repo}"

          def request(method, url, data=None, headers=None, expected=(200, 201, 204)):
              payload = None
              merged_headers = {
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "api-installer-release-publisher",
              }
              if headers:
                  merged_headers.update(headers)
              if data is not None:
                  payload = data if isinstance(data, bytes) else json.dumps(data).encode()
                  merged_headers.setdefault("Content-Type", "application/json")
              req = urllib.request.Request(url, data=payload, headers=merged_headers, method=method)
              try:
                  with urllib.request.urlopen(req) as response:
                      body = response.read()
                      if response.status not in expected:
                          raise RuntimeError(f"{method} {url} returned {response.status}: {body[:500]!r}")
                      if body:
                          return json.loads(body)
                      return None
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode(errors="replace")
                  if exc.code not in expected:
                      raise RuntimeError(f"{method} {url} failed with {exc.code}: {detail}") from exc
                  return None

          def get_release():
              try:
                  return request("GET", f"{api}/releases/tags/{urllib.parse.quote(tag)}")
              except RuntimeError as exc:
                  if "failed with 404" in str(exc):
                      return None
                  raise

          release = get_release()
          if release is not None:
              # Recreate the release so a force-updated tag cannot leave the
              # release page pinned to the previous commit without binaries.
              request("DELETE", f"{api}/releases/{release['id']}")

          release = request(
              "POST",
              f"{api}/releases",
              {
                  "tag_name": tag,
                  "target_commitish": os.environ["GITHUB_SHA"],
                  "name": title,
                  "body": pathlib.Path(body_path).read_text(),
                  "draft": False,
                  "prerelease": False,
              },
          )

          upload_url = release["upload_url"].split("{", 1)[0]
          for asset_path in assets:
              path = pathlib.Path(asset_path)
              content_type = mimetypes.guess_type(path.name)[0] or "application/octet-stream"
              url = f"{upload_url}?name={urllib.parse.quote(path.name)}"
              request(
                  "POST",
                  url,
                  path.read_bytes(),
                  headers={"Content-Type": content_type},
              )
              print(f"uploaded {path.name}")

          refreshed = request("GET", f"{api}/releases/{release['id']}")
          uploaded = {asset["name"] for asset in refreshed.get("assets", [])}
          missing = [pathlib.Path(asset).name for asset in assets if pathlib.Path(asset).name not in uploaded]
          if missing:
              raise RuntimeError(f"release asset upload did not persist: {missing}")
          PY
